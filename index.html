<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="app.js" defer></script>
  <title>Chronomètre</title>
</head>
<body>
  <h1 id="display">00:00</h1>
  <div>
    <label>Minutes: <input type="number" id="inputMin" value="0"></label>
    <label>Secondes: <input type="number" id="inputSec" value="0"></label>
    <button id="setTime">Definir le minutage</button>
  </div>

  <div>
    <button id="start">Demarrer</button>
    <button id="stop">Stop</button>
    <button id="reset">Reinitialiser</button>
  </div> 
</body>
</html>
