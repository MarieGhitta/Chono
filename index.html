<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
  <script src="app.js" defer></script>
  <title>chronomagie</title>
</head>

<body>

<h1 id="display">00:00:00</h1>

<div class="interactions">

  <div class="input">

    <label>
      <span class="label-desktop">Hours</span>
      <span class="label-mobile">h</span> :
      <input type="number" id="inputHour" value="0" min="0">
    </label>

    <label>
      <span class="label-desktop">Minutes</span>
      <span class="label-mobile">min</span> :
      <input type="number" id="inputMin" value="0" min="0">
    </label>

    <label>
      <span class="label-desktop">Seconds</span>
      <span class="label-mobile">s</span> :
      <input type="number" id="inputSec" value="0" min="0">
    </label>

    <button id="setTime">Set timer</button>

  </div>

  <div>
    <button id="start">Go</button>
    <button id="stop">Stop</button>
    <button id="reset">Reset</button>
  </div>

</div>

</body>
</html>
